<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Страница не найдена</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: monospace;
      color: #fff;
      gap: 24px;
    }

    img {
      width: 220px;
      image-rendering: pixelated;
    }

    .text {
      text-align: center;
      opacity: 0.5;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .code {
      font-size: 11px;
      opacity: 0.3;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <img src="sleeping_cat.jpg" alt="sleeping cat">
  <div class="text">
    Сайт пока отдыхает, но скоро восстановиться 
    <div class="code">404 not found</div>
  </div>
</body>
</html>
